name: chart_monitor
description: "Chart Monitor – Stock chart comparison app"
publish_to: 'none'

version: 2.2.0+8

# Version schema: MAJOR.MINOR.PATCH+BUILD
# - pubspec.yaml ist die einzige Quelle für die Versionsnummer
# - versionCode (build number) wird bei jedem Release um 1 erhöht
# - versionName (version) folgt Semantic Versioning

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2
  http: ^1.2.2
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  provider: ^6.1.2
  workmanager: ^0.9.0
  flutter_local_notifications: ^18.0.1
  package_info_plus: ^8.0.2
  math_expressions: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
